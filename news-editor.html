<!doctype html><html lang="hr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Uredi vijesti</title><link rel="stylesheet" href="assets/style.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="assets/supabase-config.js"></script></head><body><main class="page"><section class="card"><h1>Uredi vijesti</h1><p>Admin/editor mogu dodati ili urediti vijesti koje se prikazuju na public pageu.</p><button id="newBtn">+ Nova vijest</button><div id="status"></div><div id="list"></div></section><dialog id="editor"><form method="dialog" id="form"><h2 id="modalTitle">Vijest</h2><input type="hidden" id="id"><label>Naslov<input id="title" required></label><label>Kratki opis<textarea id="summary"></textarea></label><label>Tekst vijesti<textarea id="body"></textarea></label><label>Slika/banner URL<input id="image_url" placeholder="assets/news/banner.png ili https://..."></label><label>PDF URL<input id="pdf_url"></label><label>CTA tekst<input id="cta_label" placeholder="Prijavi se"></label><label>CTA link<input id="cta_url"></label><label>Datum objave<input id="published_at" type="datetime-local"></label><label><input id="published" type="checkbox" checked> Objavljeno</label><label><input id="pinned" type="checkbox"> Prikvači na vrh</label><menu><button value="cancel">Odustani</button><button id="saveBtn" value="default">Spremi</button></menu></form></dialog></main><script src="assets/news-editor.js"></script></body></html>
