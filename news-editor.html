<!doctype html>
<html lang="hr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Uredi vijesti · SOV</title>
  <link rel="stylesheet" href="assets/site.css">
  <style>
    body{background:#07110e;color:#eef7ef;font-family:system-ui,-apple-system,Segoe UI,sans-serif;margin:0}.editor-shell{max-width:1180px;margin:0 auto;padding:22px}.editor-top{display:flex;gap:12px;align-items:center;justify-content:space-between;flex-wrap:wrap;margin-bottom:18px}.editor-top h1{margin:0;font-size:clamp(26px,4vw,42px)}.editor-actions{display:flex;gap:10px;flex-wrap:wrap}.btn{border:0;border-radius:14px;padding:11px 14px;font-weight:900;cursor:pointer;background:#d7f66f;color:#102016;text-decoration:none;display:inline-flex;align-items:center;gap:8px}.btn.secondary{background:#18352d;color:#dff5e8;border:1px solid rgba(255,255,255,.13)}.btn.danger{background:#703232;color:#fff}.btn.ghost{background:transparent;border:1px solid rgba(255,255,255,.18);color:#eaf5ee}.panel{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:24px;padding:18px;box-shadow:0 18px 60px rgba(0,0,0,.28)}#status{margin:10px 0;color:#f7e7a2;font-weight:800}.filters{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0}.filters input,.filters select{background:#0d211c;color:#fff;border:1px solid rgba(255,255,255,.16);border-radius:14px;padding:12px;min-width:220px}.news-list{display:grid;gap:12px}.news-admin-card{display:grid;grid-template-columns:150px 1fr auto;gap:14px;align-items:stretch;background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:12px}.thumb{background:#13251f center/cover no-repeat;border-radius:14px;min-height:95px;border:1px solid rgba(255,255,255,.1)}.news-admin-card h3{margin:0 0 6px;font-size:20px}.news-admin-card p{margin:0 0 8px;color:#cfe2d7}.meta{font-size:12px;color:#9db4a7}.card-buttons{display:flex;flex-direction:column;gap:8px;min-width:118px}dialog{border:0;border-radius:24px;padding:0;background:#0b1714;color:#eef7ef;max-width:900px;width:calc(100vw - 28px);box-shadow:0 30px 120px rgba(0,0,0,.65)}dialog::backdrop{background:rgba(0,0,0,.72)}.modal{padding:20px}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.form-grid .full{grid-column:1/-1}label{display:grid;gap:6px;font-weight:800;color:#d7eadf}input,textarea{background:#06110e;color:#fff;border:1px solid rgba(255,255,255,.16);border-radius:13px;padding:11px;font:inherit}textarea{min-height:90px}.modal-menu{display:flex;gap:10px;justify-content:flex-end;margin-top:16px}.preview-img{max-width:100%;max-height:210px;border-radius:14px;object-fit:cover;border:1px solid rgba(255,255,255,.12)}.empty{padding:24px;text-align:center;color:#cfe2d7;border:1px dashed rgba(255,255,255,.2);border-radius:18px}@media(max-width:760px){.news-admin-card{grid-template-columns:1fr}.card-buttons{flex-direction:row;flex-wrap:wrap}.form-grid{grid-template-columns:1fr}}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/supabase-config.js"></script>
  <script src="assets/auth.js"></script>
</head>
<body>
  <main class="editor-shell">
    <div class="editor-top">
      <div><h1>Uredi vijesti</h1><p>Dodavanje, uređivanje, sakrivanje i brisanje postojećih vijesti.</p></div>
      <div class="editor-actions"><a class="btn secondary" href="vijesti.html">← Vijesti</a><button class="btn secondary" id="refreshBtn">Osvježi</button><button class="btn" id="newBtn">+ Nova vijest</button></div>
    </div>
    <section class="panel">
      <div class="filters"><input id="search" placeholder="Traži naslov, tekst, link..."><select id="filter"><option value="all">Sve vijesti</option><option value="published">Objavljene</option><option value="hidden">Skrivene</option><option value="pinned">Prikvačene</option></select><button class="btn ghost" id="importStaticBtn" title="Uvezi osnovne statičke vijesti u bazu ako ih nema">Uvezi statičke vijesti</button></div>
      <div id="status"></div>
      <div id="list" class="news-list"></div>
    </section>
  </main>
  <dialog id="editorDialog"><form method="dialog" id="form" class="modal"><h2 id="modalTitle">Vijest</h2><input type="hidden" id="id"><div class="form-grid"><label class="full">Naslov<input id="title" required></label><label>Kratki opis<textarea id="summary"></textarea></label><label>Tekst vijesti<textarea id="body"></textarea></label><label>Slika/banner URL<input id="image_url" placeholder="assets/news/banner.png ili https://..."></label><label>PDF URL<input id="pdf_url"></label><label>CTA tekst<input id="cta_label" placeholder="Prijavi se"></label><label>CTA link<input id="cta_url"></label><label>Datum objave<input id="published_at" type="datetime-local"></label><label>Opcije<span><input id="published" type="checkbox" checked> Objavljeno<br><input id="pinned" type="checkbox"> Prikvači na vrh</span></label><div class="full" id="imagePreviewWrap"></div></div><menu class="modal-menu"><button class="btn ghost" value="cancel">Odustani</button><button class="btn" id="saveBtn" value="default">Spremi promjene</button></menu></form></dialog>
  <script src="assets/news-editor.js"></script>
</body>
</html>
