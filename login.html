<!doctype html><html lang="hr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Prijava — SOV Cloud</title><link rel="stylesheet" href="assets/site.css"></head><body><header class="nav wrap"><a class="brand" href="index.html"><div class="brand-mark">SOV</div><div><strong>Speleološki odsjek Velebit</strong><small>Zagreb</small></div></a><nav class="nav-links"><a href="vijesti.html">Vijesti</a><a href="o-drustvu.html">O društvu</a><a href="povijest.html">Povijest</a><a href="velebitaski-duh.html">Velebitaški duh</a><a href="speleoskola.html">Speleoškola</a><a class="pill" href="login.html">Prijava</a></nav></header>
<main class="wrap"><section class="login-shell"><div><div class="eyebrow">SOV Cloud</div><h1 style="font-size:clamp(54px,7vw,96px);line-height:.9;letter-spacing:-.075em">Prijava u člansku zonu.</h1><p class="lead">Registracije su zatvorene za javnost i čekaju admin odobrenje. Demo admin: admin@sov.local / admin</p></div><section class="form-card"><div class="tabs"><button class="tab active" id="loginTab">Prijava</button><button class="tab" id="regTab">Registracija</button></div><form id="loginForm"><div class="field"><label>Email</label><input id="loginEmail" type="email" required></div><div class="field"><label>Lozinka</label><input id="loginPass" type="password" required></div><button class="btn primary" style="width:100%">Uđi</button><p id="loginMsg" class="muted"></p></form><form id="regForm" class="hidden"><div class="field"><label>Ime i prezime</label><input id="regName" required></div><div class="field"><label>Email</label><input id="regEmail" type="email" required></div><div class="field"><label>Lozinka</label><input id="regPass" type="password" required></div><div class="field"><label>Razlog pristupa</label><textarea id="regReason"></textarea></div><button class="btn primary" style="width:100%">Pošalji zahtjev</button><p id="regMsg" class="muted"></p></form></section></section></main><script src="assets/auth.js"></script><script>const l=document.getElementById('loginTab'),r=document.getElementById('regTab'),lf=document.getElementById('loginForm'),rf=document.getElementById('regForm');l.onclick=()=>{l.classList.add('active');r.classList.remove('active');lf.classList.remove('hidden');rf.classList.add('hidden')};r.onclick=()=>{r.classList.add('active');l.classList.remove('active');rf.classList.remove('hidden');lf.classList.add('hidden')};lf.onsubmit=e=>{e.preventDefault();let res=SOVAuth.login(loginEmail.value,loginPass.value);if(res.ok)location.href='dashboard.html';else loginMsg.textContent=res.msg};rf.onsubmit=e=>{e.preventDefault();let res=SOVAuth.register(regName.value,regEmail.value,regPass.value,regReason.value);regMsg.textContent=res.msg}</script></body></html>
