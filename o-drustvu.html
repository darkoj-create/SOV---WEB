<!DOCTYPE html>
<html lang="hr"><head><meta charset="utf-8"/><meta content="width=device-width,initial-scale=1" name="viewport"/><title>O društvu — SOV</title><meta content="O društvu" name="description"/><link href="assets/site.css" rel="stylesheet"/>
<style>
.peopleGrid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin:26px 0 34px}.person{border:1px solid var(--line);border-radius:24px;background:rgba(255,255,255,.045);padding:18px;min-height:150px}.person .role{color:var(--accent);font-size:12px;font-weight:1000;letter-spacing:.12em;text-transform:uppercase;margin-bottom:12px}.person b{display:block;font-size:21px;line-height:1.08;letter-spacing:-.035em}.person span{display:block;color:var(--muted);margin-top:8px;line-height:1.4}.featureLink{display:flex;align-items:center;justify-content:space-between;gap:18px;border:1px solid rgba(215,246,111,.25);border-radius:28px;background:linear-gradient(135deg,rgba(215,246,111,.12),rgba(120,215,255,.06));padding:24px;margin:26px 0;text-decoration:none;color:var(--text)}.featureLink b{font-size:28px;letter-spacing:-.04em}.featureLink span{color:#d5dfdf;line-height:1.55}.featureIcon{width:64px;height:64px;border-radius:22px;border:1px solid rgba(255,255,255,.14);display:grid;place-items:center;background:rgba(0,0,0,.22)}.featureIcon svg{width:34px;height:34px;stroke:var(--accent);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}.miniLead{color:#d5dfdf;line-height:1.7;font-size:18px}.timeline{position:relative;margin-top:28px}.timeline:before{content:"";position:absolute;left:112px;top:0;bottom:0;width:1px;background:linear-gradient(var(--accent),rgba(255,255,255,.06))}.entry{display:grid;grid-template-columns:92px 1fr;gap:42px;margin:0 0 18px}.year{color:var(--accent);font-weight:1000;letter-spacing:-.025em;font-size:22px;padding-top:18px;text-align:right}.entryCard{border:1px solid var(--line);border-radius:24px;background:linear-gradient(180deg,rgba(255,255,255,.062),rgba(255,255,255,.025));padding:20px;position:relative}.entryCard:before{content:"";position:absolute;left:-49px;top:24px;width:13px;height:13px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 6px rgba(215,246,111,.12)}.roles{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.r{border:1px solid rgba(255,255,255,.075);border-radius:16px;padding:12px;background:rgba(0,0,0,.16)}.r small{display:block;color:var(--accent);font-weight:1000;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}.r b{font-size:17px}.note{color:var(--muted);font-size:14px;line-height:1.55;margin-top:12px}@media(max-width:900px){.peopleGrid{grid-template-columns:1fr 1fr}.timeline:before{left:18px}.entry{grid-template-columns:1fr;gap:8px;padding-left:42px}.year{text-align:left;padding-top:0}.entryCard:before{left:-31px}.roles{grid-template-columns:1fr}.featureLink{align-items:flex-start}.featureIcon{display:none}}@media(max-width:560px){.peopleGrid{grid-template-columns:1fr}}
</style>
