<!doctype html><html lang="hr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Oružarstvo import — SOV Cloud</title><link rel="stylesheet" href="assets/site.css"><link rel="stylesheet" href="assets/mobile.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="assets/supabase-config.js"></script><script src="assets/auth.js"></script><script src="assets/oruzarstvo-supabase.js?v=4.78"></script><style>body{background:#071013;color:#eef7f3}.import-shell{width:min(980px,calc(100% - 32px));margin:0 auto;padding:24px 0 64px}.import-card{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.055);border-radius:28px;padding:24px;box-shadow:0 20px 70px rgba(0,0,0,.35)}.import-card h1{font-size:clamp(34px,6vw,72px);line-height:.95;margin:0 0 12px}.import-card p{color:#aebfba;line-height:1.65}.row{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}.btn{border:1px solid rgba(255,255,255,.14);border-radius:14px;background:rgba(255,255,255,.08);color:#eef7f3;padding:11px 14px;font-weight:900;text-decoration:none;cursor:pointer}.btn.primary{background:#d7f66f;color:#111;border:0}.log{white-space:pre-wrap;background:rgba(0,0,0,.28);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:14px;margin-top:16px;color:#dce9e4;min-height:160px}.statgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin:18px 0}.stat{border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:14px;background:rgba(0,0,0,.18)}.stat small{display:block;color:#aebfba}.stat b{font-size:24px}</style></head><body><main class="import-shell"><section class="import-card"><a class="btn" href="oruzarstvo.html">← Oružarstvo</a><p></p><h1>Import oružarstva u Supabase</h1><p>Ova stranica uzima <code>data/oruzarstvo-data.json</code> iz Claude XLS modela i puni Supabase tablice za katalog, lokacije, komade, užad, nabavu, rashod, teren i inventure. Pokreće je samo <b>admin</b> ili <b>oružar</b>.</p><div class="statgrid" id="stats"></div><div class="row"><button class="btn primary" id="runImport">Pokreni import</button><a class="btn" href="SUPABASE_ORUZARSTVO_SETUP.sql">SQL schema</a></div><div class="log" id="log">Spremno.</div></section></main><script>
function normalizeImportData(data){const empty={summary:{},categories:[],items:[],pieces:[],ropes:[],loans:[],inventories:[],inventory_items:[],procurement:[],services:[],disposed:[],lost:[],field:[],locations:[]}; if(!data||typeof data!=='object')return empty; Object.keys(empty).forEach(k=>{empty[k]=Array.isArray(empty[k])?(Array.isArray(data[k])?data[k]:[]):((data[k]&&typeof data[k]==='object')?data[k]:{});}); return empty;}
let DATA=normalizeImportData(null);const log=t=>{document.getElementById('log').textContent+=`\n${t}`};async function init(){if(window.SOVAuth){await SOVAuth.ready();if(!(await SOVAuth.can('armory'))){document.getElementById('runImport').disabled=true;log('Nemaš oružar/admin ovlasti. Preusmjeravam na dashboard.');location.href='dashboard.html?denied=armory';return;}}try{const res=await fetch('data/oruzarstvo-data.json',{cache:'no-store'});DATA=normalizeImportData(await res.json());}catch(e){DATA=normalizeImportData(null);log('Upozorenje: ne mogu učitati data/oruzarstvo-data.json, koristim praznu strukturu.');console.error(e)}const rows=[['Kategorije',DATA.categories.length],['Katalog',DATA.items.length],['Komadi',DATA.pieces.length],['Užad',DATA.ropes.length],['Inventure',DATA.inventories.length],['Nabava',DATA.procurement.length],['Rashod/izgubljeno',DATA.disposed.length+DATA.lost.length],['Teren',DATA.field.length]];document.getElementById('stats').innerHTML=rows.map(r=>`<div class="stat"><small>${r[0]}</small><b>${r[1]}</b></div>`).join('')}document.getElementById('runImport').addEventListener('click',async()=>{document.getElementById('log').textContent='Import kreće...';try{DATA=normalizeImportData(DATA);if(!window.SOVArmoryDB||!SOVArmoryDB.configured())throw new Error('Supabase nije konfiguriran u assets/supabase-config.js');const result=await SOVArmoryDB.importStaticData(DATA);log(JSON.stringify(result,null,2));log('Gotovo.');}catch(e){log('GREŠKA: '+e.message);console.error(e)}});document.addEventListener('DOMContentLoaded',init);
</script>

.v459-head h2,.user-catalog-head h2{letter-spacing:-.045em!important;text-shadow:0 2px 18px rgba(0,0,0,.45)!important}

<script id="v469-real-icon-system">
(function(){
  const C={lime:'#d7f66f',cyan:'#7dd3fc',amber:'#fbbf24',orange:'#fb923c',red:'#f87171',green:'#86efac',white:'#f8fafc',muted:'#b6c7c0',blue:'#60a5fa',purple:'#c084fc'};
  function svg(body){return `<svg viewBox="0 0 64 64" aria-hidden="true" fill="none" xmlns="http://www.w3.org/2000/svg">${body}</svg>`}
  const icons={
    speleo:svg(`<circle cx="32" cy="18" r="10" fill="${C.amber}"/><path d="M17 24c2-10 11-16 22-13 6 2 9 6 10 13" stroke="${C.white}" stroke-width="3" stroke-linecap="round"/><path d="M22 31h20c5 0 8 4 8 9v13H14V40c0-5 3-9 8-9Z" fill="${C.orange}"/><path d="M23 35l9 9 9-9M32 44v11" stroke="#1b2930" stroke-width="3" stroke-linecap="round"/><circle cx="43" cy="19" r="4" fill="${C.cyan}"/><path d="M48 22l7 6M48 14l7-5" stroke="${C.cyan}" stroke-width="3" stroke-linecap="round"/><path d="M14 53c8-9 26-9 36 0" stroke="${C.lime}" stroke-width="3" stroke-linecap="round"/>`),
    rope:svg(`<path d="M16 42c8 8 21 8 29 0s8-21 0-29" stroke="${C.cyan}" stroke-width="6" stroke-linecap="round"/><path d="M49 22c-8-8-21-8-29 0s-8 21 0 29" stroke="${C.blue}" stroke-width="6" stroke-linecap="round"/><path d="M18 18l28 28M46 18L18 46" stroke="${C.lime}" stroke-width="4" stroke-linecap="round"/>`),
    anchor:svg(`<path d="M32 9v38" stroke="${C.white}" stroke-width="5" stroke-linecap="round"/><path d="M18 29h28" stroke="${C.white}" stroke-width="5" stroke-linecap="round"/><path d="M21 21l22 22" stroke="${C.amber}" stroke-width="5" stroke-linecap="round"/><circle cx="32" cy="14" r="5" fill="${C.orange}"/><path d="M15 47c5 5 11 7 17 7s12-2 17-7" stroke="${C.lime}" stroke-width="4" stroke-linecap="round"/>`),
    drawing:svg(`<path d="M12 46l34-34 8 8-34 34H12v-8Z" fill="${C.amber}"/><path d="M39 19l6 6" stroke="#1f2937" stroke-width="3"/><path d="M12 13h18v38H12V13Z" stroke="${C.white}" stroke-width="3"/><path d="M16 21h8M16 29h5M16 37h8" stroke="${C.cyan}" stroke-width="3" stroke-linecap="round"/>`),
    drill:svg(`<path d="M12 22h27c6 0 10 4 10 9H28v7H15c-3 0-5-2-5-5v-7c0-2 1-4 2-4Z" fill="${C.amber}"/><path d="M29 38v14h-9V38" fill="${C.orange}"/><path d="M49 30h8" stroke="${C.white}" stroke-width="4" stroke-linecap="round"/><rect x="38" y="42" width="14" height="10" rx="3" fill="${C.green}"/><path d="M18 28h8" stroke="#1f2937" stroke-width="3" stroke-linecap="round"/>`),
    camera:svg(`<rect x="11" y="21" width="42" height="28" rx="7" fill="${C.muted}"/><path d="M21 21l4-7h14l4 7" fill="${C.white}"/><circle cx="33" cy="35" r="10" fill="#17211f" stroke="${C.cyan}" stroke-width="4"/><circle cx="33" cy="35" r="4" fill="${C.purple}"/><path d="M47 27h1" stroke="#17211f" stroke-width="4" stroke-linecap="round"/>`),
    alpinist:svg(`<path d="M14 51l13-28 10 17 7-12 8 23" stroke="${C.white}" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><circle cx="37" cy="17" r="6" fill="${C.red}"/><path d="M32 28l8 6 9-5M35 25l-9 11" stroke="${C.orange}" stroke-width="4" stroke-linecap="round"/><path d="M12 54h42" stroke="${C.lime}" stroke-width="3" stroke-linecap="round"/>`),
    diving:svg(`<path d="M14 29c4-8 12-12 18-12s14 4 18 12v8c-5 6-31 6-36 0v-8Z" fill="${C.cyan}"/><path d="M20 31h9M35 31h9" stroke="#0b2023" stroke-width="5" stroke-linecap="round"/><path d="M32 39v10M23 52h18" stroke="${C.white}" stroke-width="4" stroke-linecap="round"/>`),
    med:svg(`<rect x="13" y="20" width="38" height="30" rx="7" fill="${C.red}"/><path d="M25 20v-5h14v5" stroke="${C.white}" stroke-width="4"/><path d="M32 27v16M24 35h16" stroke="${C.white}" stroke-width="6" stroke-linecap="round"/>`),
    clean:svg(`<path d="M16 24h28l-3 28H19l-3-28Z" fill="${C.blue}"/><path d="M22 24c1-7 7-11 14-7 3 2 5 4 6 7" stroke="${C.white}" stroke-width="4"/><path d="M43 17l8-8M49 22l7-4" stroke="${C.lime}" stroke-width="4" stroke-linecap="round"/>`),
    tent:svg(`<path d="M8 51l24-36 24 36H8Z" fill="${C.orange}"/><path d="M32 15v36M23 51l9-18 9 18" stroke="#1b2930" stroke-width="3"/><path d="M10 51h44" stroke="${C.white}" stroke-width="3" stroke-linecap="round"/>`),
    hammer:svg(`<path d="M21 18l8-8 12 12-8 8-12-12Z" fill="${C.muted}"/><path d="M31 28l20 20-7 7-20-20" fill="${C.amber}"/><path d="M16 14l10 10" stroke="${C.white}" stroke-width="4" stroke-linecap="round"/>`),
    wrench:svg(`<path d="M45 12a13 13 0 0 0-16 16L13 44a6 6 0 0 0 8 8l16-16a13 13 0 0 0 16-16l-9 9-8-8 9-9Z" fill="${C.muted}"/><circle cx="18" cy="48" r="3" fill="#1b2930"/>`),
    boot:svg(`<path d="M18 12h15l4 25 14 5c4 2 5 7 1 10H13c-4 0-5-5-2-8l8-8-1-24Z" fill="${C.orange}"/><path d="M18 36h19M18 23h14M20 29h14" stroke="#1b2930" stroke-width="3" stroke-linecap="round"/>`),
    helmet:svg(`<path d="M14 36c0-13 8-23 18-23s18 10 18 23v9H14v-9Z" fill="${C.amber}"/><path d="M14 42h36" stroke="${C.white}" stroke-width="4"/><path d="M32 13v16" stroke="#1b2930" stroke-width="3" stroke-linecap="round"/>`),
    light:svg(`<path d="M16 18h26l8 8-8 8H16V18Z" fill="${C.muted}"/><path d="M42 20l14-7M43 32l14 7" stroke="${C.lime}" stroke-width="4" stroke-linecap="round"/><circle cx="23" cy="26" r="5" fill="${C.cyan}"/>`),
    box:svg(`<path d="M32 10l22 12-22 12-22-12 22-12Z" fill="${C.amber}"/><path d="M10 22v24l22 12 22-12V22" fill="${C.orange}"/><path d="M32 34v24M20 16l22 12" stroke="#1b2930" stroke-width="3"/>`),
    bag:svg(`<path d="M18 21h28a7 7 0 0 1 7 7v22H11V28a7 7 0 0 1 7-7Z" fill="${C.green}"/><path d="M24 21v-6h16v6" stroke="${C.white}" stroke-width="4"/><path d="M24 34h16M24 42h10" stroke="#1b2930" stroke-width="3" stroke-linecap="round"/>`)
  };
  function kind(title){const t=String(title||'').toLowerCase();
    if(t.includes('osobna'))return 'speleo';
    if(t.includes('alpin'))return 'alpinist';
    if(t.includes('užad')||t.includes('uzet')||t.includes('uže')||t.includes('uze'))return 'rope';
    if(t.includes('postavlj')||t.includes('spit')||t.includes('sidri'))return 'anchor';
    if(t.includes('crtan')||t.includes('mjeren'))return 'drawing';
    if(t.includes('bušil')||t.includes('busil')||t.includes('bater')||t.includes('punjač')||t.includes('punjac'))return 'drill';
    if(t.includes('elektro')||t.includes('foto'))return 'camera';
    if(t.includes('ronil'))return 'diving';
    if(t.includes('medicin'))return 'med';
    if(t.includes('čisto')||t.includes('cisto'))return 'clean';
    if(t.includes('kamp')||t.includes('ekspedic')||t.includes('logor'))return 'tent';
    if(t.includes('prošir')||t.includes('prosir'))return 'hammer';
    if(t.includes('alat'))return 'wrench';
    if(t.includes('odje')||t.includes('obu'))return 'boot';
    if(t.includes('kacig'))return 'helmet';
    if(t.includes('rasvjet')||t.includes('svjet'))return 'light';
    if(t.includes('torbe')||t.includes('transport'))return 'bag';
    return 'box';
  }
  function enhance(root=document){
    root.querySelectorAll('.user-category-card,.v459-category-card,.v460-cat-card,.category-card').forEach(card=>{
      const b=card.querySelector('b,h3,h2'); if(!b)return; const title=b.textContent.trim();
      let ico=card.querySelector('.ico'); if(!ico){ico=document.createElement('span'); ico.className='ico'; card.insertBefore(ico,card.firstChild)}
      const k=kind(title); if(ico.dataset.iconKind===k)return; ico.dataset.iconKind=k; ico.innerHTML=icons[k]||icons.box;
      card.dataset.iconKind=k;
    });
  }
  const obs=new MutationObserver(()=>enhance());
  document.addEventListener('DOMContentLoaded',()=>{enhance(); obs.observe(document.body,{childList:true,subtree:true}); setTimeout(enhance,300); setTimeout(enhance,1000); setTimeout(enhance,2500);});
  window.SOVEnhanceCategoryIcons=enhance;
  try{
    if(window.USER_CATEGORY_META){
      USER_CATEGORY_META['Osobna oprema']=['','Pojasevi, crollovi, descenderi, blokeri i osobna speleo oprema.'];
      USER_CATEGORY_META['Alpinistička oprema']=['','Alpinistička oprema i pribor.'];
    }
  }catch(e){}
})();
</script>
