<!doctype html><html lang="hr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Oružarstvo import — SOV Cloud</title><link rel="stylesheet" href="assets/site.css"><link rel="stylesheet" href="assets/mobile.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="assets/supabase-config.js"></script><script src="assets/auth.js"></script><script src="assets/oruzarstvo-supabase.js"></script><style>body{background:#071013;color:#eef7f3}.import-shell{width:min(980px,calc(100% - 32px));margin:0 auto;padding:24px 0 64px}.import-card{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.055);border-radius:28px;padding:24px;box-shadow:0 20px 70px rgba(0,0,0,.35)}.import-card h1{font-size:clamp(34px,6vw,72px);line-height:.95;margin:0 0 12px}.import-card p{color:#aebfba;line-height:1.65}.row{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}.btn{border:1px solid rgba(255,255,255,.14);border-radius:14px;background:rgba(255,255,255,.08);color:#eef7f3;padding:11px 14px;font-weight:900;text-decoration:none;cursor:pointer}.btn.primary{background:#d7f66f;color:#111;border:0}.log{white-space:pre-wrap;background:rgba(0,0,0,.28);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:14px;margin-top:16px;color:#dce9e4;min-height:160px}.statgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin:18px 0}.stat{border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:14px;background:rgba(0,0,0,.18)}.stat small{display:block;color:#aebfba}.stat b{font-size:24px}</style></head><body><main class="import-shell"><section class="import-card"><a class="btn" href="oruzarstvo.html">← Oružarstvo</a><p></p><h1>Import oružarstva u Supabase</h1><p>Ova stranica uzima <code>data/oruzarstvo-data.json</code> iz Claude XLS modela i puni Supabase tablice za katalog, lokacije, komade, užad, nabavu, rashod, teren i inventure. Pokreće je samo <b>admin</b> ili <b>oružar</b>.</p><div class="statgrid" id="stats"></div><div class="row"><button class="btn primary" id="runImport">Pokreni import</button><a class="btn" href="SUPABASE_ORUZARSTVO_SETUP.sql">SQL schema</a></div><div class="log" id="log">Spremno.</div></section></main><script>
function normalizeImportData(data){const empty={summary:{},categories:[],items:[],pieces:[],ropes:[],loans:[],inventories:[],inventory_items:[],procurement:[],services:[],disposed:[],lost:[],field:[],locations:[]}; if(!data||typeof data!=='object')return empty; Object.keys(empty).forEach(k=>{empty[k]=Array.isArray(empty[k])?(Array.isArray(data[k])?data[k]:[]):((data[k]&&typeof data[k]==='object')?data[k]:{});}); return empty;}
let DATA=normalizeImportData(null);const log=t=>{document.getElementById('log').textContent+=`\n${t}`};async function init(){if(window.SOVAuth){await SOVAuth.ready();if(!(await SOVAuth.can('armory'))){document.getElementById('runImport').disabled=true;log('Nemaš oružar/admin ovlasti. Preusmjeravam na dashboard.');location.href='dashboard.html?denied=armory';return;}}try{const res=await fetch('data/oruzarstvo-data.json',{cache:'no-store'});DATA=normalizeImportData(await res.json());}catch(e){DATA=normalizeImportData(null);log('Upozorenje: ne mogu učitati data/oruzarstvo-data.json, koristim praznu strukturu.');console.error(e)}const rows=[['Kategorije',DATA.categories.length],['Katalog',DATA.items.length],['Komadi',DATA.pieces.length],['Užad',DATA.ropes.length],['Inventure',DATA.inventories.length],['Nabava',DATA.procurement.length],['Rashod/izgubljeno',DATA.disposed.length+DATA.lost.length],['Teren',DATA.field.length]];document.getElementById('stats').innerHTML=rows.map(r=>`<div class="stat"><small>${r[0]}</small><b>${r[1]}</b></div>`).join('')}document.getElementById('runImport').addEventListener('click',async()=>{document.getElementById('log').textContent='Import kreće...';try{DATA=normalizeImportData(DATA);if(!window.SOVArmoryDB||!SOVArmoryDB.configured())throw new Error('Supabase nije konfiguriran u assets/supabase-config.js');const result=await SOVArmoryDB.importStaticData(DATA);log(JSON.stringify(result,null,2));log('Gotovo.');}catch(e){log('GREŠKA: '+e.message);console.error(e)}});document.addEventListener('DOMContentLoaded',init);
</script>
