<!doctype html>
<html lang="hr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SOV Karta</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--bg:#050707;--panel:#0d1215;--text:#f3f6f5;--muted:#98a8aa;--line:rgba(255,255,255,.12);--accent:#d7f66f;--blue:#78d7ff;--red:#ff7474}
*{box-sizing:border-box}body{margin:0;height:100vh;overflow:hidden;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text)}
.app{height:100vh;display:grid;grid-template-rows:72px 1fr}.top{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:0 18px;border-bottom:1px solid var(--line);background:rgba(5,8,9,.96)}.brand{display:flex;align-items:center;gap:12px;font-weight:900}.mark{width:44px;height:44px;border-radius:15px;border:1px solid var(--line);display:grid;place-items:center;background:#111b20}.nav{display:flex;gap:10px}.btn{border:1px solid var(--line);border-radius:999px;padding:10px 13px;background:rgba(255,255,255,.04);color:#dce6e6;text-decoration:none;font-weight:800;font-size:13px;cursor:pointer}.btn.primary{background:var(--accent);color:#101400;border:0}
.shell{display:grid;grid-template-columns:1fr 390px;min-height:0}.mapWrap{position:relative;min-width:0}#map{height:100%;width:100%;background:#111}.toolbar{position:absolute;z-index:500;left:16px;top:16px;display:flex;gap:8px;flex-wrap:wrap}.panel{border-left:1px solid var(--line);background:linear-gradient(180deg,rgba(13,18,21,.98),rgba(7,10,12,.98));padding:18px;overflow:auto}.panel h1{font-size:34px;line-height:1;letter-spacing:-.05em;margin:0 0 8px}.muted{color:var(--muted);line-height:1.5}.search{width:100%;border:1px solid var(--line);border-radius:16px;padding:14px;background:#091013;color:#fff;margin:16px 0}.filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}.chip{border:1px solid var(--line);border-radius:999px;padding:8px 10px;font-size:12px;color:#dce6e6;background:rgba(255,255,255,.035);cursor:pointer}.chip.active{background:rgba(215,246,111,.16);border-color:rgba(215,246,111,.35);color:#fff}.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:14px 0}.stat{border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.035);padding:10px}.stat b{display:block}.stat span{font-size:12px;color:var(--muted)}.result{border:1px solid var(--line);border-radius:18px;background:rgba(255,255,255,.045);padding:14px;margin-bottom:10px;cursor:pointer}.result:hover{border-color:rgba(215,246,111,.35)}.result b{display:block}.result small{color:var(--accent);font-weight:900}.details{margin-top:16px;border:1px solid var(--line);border-radius:20px;background:rgba(255,255,255,.045);padding:16px}.details h2{margin:0 0 8px;font-size:24px;letter-spacing:-.04em}.kv{display:grid;grid-template-columns:120px 1fr;gap:8px;border-top:1px solid var(--line);padding-top:10px;margin-top:10px}.kv div:nth-child(odd){color:var(--muted)}.leaflet-control-layers,.leaflet-popup-content-wrapper{background:#10181d;color:#fff;border:1px solid var(--line)}@media(max-width:900px){body{overflow:auto}.app{height:auto;min-height:100vh}.shell{grid-template-columns:1fr}.mapWrap{height:62vh}.panel{border-left:0;border-top:1px solid var(--line)}} 
</style>
</head>
<body>
<div class="app">
<header class="top"><div class="brand"><div class="mark">SOV</div><div>SOV Karta<br><small style="color:var(--accent)">JSON baza / TK25 / search</small></div></div><nav class="nav"><a class="btn" href="dashboard.html">Dashboard</a><button class="btn primary" onclick="exportVisible()">Export KML</button></nav></header>
<main class="shell">
<section class="mapWrap"><div class="toolbar"><button class="btn primary" onclick="setBase('tk25')">TK25</button><button class="btn" onclick="setBase('osm')">OSM</button><button class="btn" onclick="fitAll()">Svi objekti</button><button class="btn" onclick="toggleMarkers()">Markeri</button></div><div id="map"></div></section>
<aside class="panel"><h1>Pretraga objekata</h1><p class="muted">Baza se učitava iz <code>data/sov-baza.json</code>. Search radi po nazivu, mjestu, općini, županiji, statusu, tipu i broju katastra.</p><input class="search" id="q" placeholder="Traži objekt, lokaciju, dubinu..." oninput="render()"><div class="filters"><button class="chip active" data-filter="all" onclick="setFilter('all')">Sve</button><button class="chip" data-filter="jama" onclick="setFilter('jama')">Jame</button><button class="chip" data-filter="spilja" onclick="setFilter('spilja')">Špilje</button><button class="chip" data-filter="katastar" onclick="setFilter('katastar')">U katastru</button><button class="chip" data-filter="nije" onclick="setFilter('nije')">Nije u katastru</button></div><div class="stats"><div class="stat"><b id="total">0</b><span>ukupno</span></div><div class="stat"><b id="shown">0</b><span>prikazano</span></div><div class="stat"><b id="marked">0</b><span>na karti</span></div></div><div id="results"></div><div id="details" class="details"><h2>Odaberi objekt</h2><p class="muted">Klik na marker ili rezultat otvara detalje ovdje.</p></div></aside>
</main>
</div>
<script>
const DATA_URL='data/sov-baza.json';
const TK25_WMS_URL='https://geoportal.dgu.hr/services/tk25/wms';
const TK25_WMS_LAYER='TK25';
let all=[], visible=[], activeFilter='all', markersVisible=true, markerLayer;
const map=L.map('map',{zoomControl:true}).setView([44.8,15.4],7);
const osm=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'OSM'}).addTo(map);
const tk25=L.tileLayer.wms(TK25_WMS_URL,{layers:TK25_WMS_LAYER,format:'image/png',transparent:true,version:'1.3.0',attribution:'TK25 WMS'});
markerLayer=L.layerGroup().addTo(map);
L.control.layers({'OSM':osm,'TK25 WMS':tk25},{'SOV objekti':markerLayer}).addTo(map);
function norm(v){return (v==null?'':String(v)).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')}
function isSpilja(o){return norm(o.object_type_final+' '+o.name).includes('spilj')||norm(o.object_type_final).includes('pec')}
function isJama(o){return norm(o.object_type_final+' '+o.name).includes('jama')||norm(o.object_type_final).includes('jaz')||norm(o.object_type_final).includes('brez')}
function matchesFilter(o){if(activeFilter==='all')return true;if(activeFilter==='jama')return isJama(o);if(activeFilter==='spilja')return isSpilja(o);if(activeFilter==='katastar')return !!o.in_cadastre_bool;if(activeFilter==='nije')return !o.in_cadastre_bool;return true}
function searchable(o){return norm([o.name,o.county,o.municipality,o.nearest_place,o.locality,o.cadastre_status,o.record_status,o.object_type_final,o.cadastral_number,o.plate_number].join(' '))}
function setFilter(f){activeFilter=f;document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('active',c.dataset.filter===f));render()}
function render(){const q=norm(document.getElementById('q').value);visible=all.filter(o=>Number.isFinite(o.lat)&&Number.isFinite(o.lon)&&matchesFilter(o)&&searchable(o).includes(q));document.getElementById('total').textContent=all.length;document.getElementById('shown').textContent=visible.length;drawMarkers();drawResults()}
function color(o){if(!o.in_cadastre_bool)return '#ffb15f';if(isJama(o))return '#d7f66f';if(isSpilja(o))return '#78d7ff';return '#ffffff'}
function drawMarkers(){markerLayer.clearLayers();if(!markersVisible){document.getElementById('marked').textContent=0;return}const max=visible.slice(0,1200);max.forEach(o=>L.circleMarker([o.lat,o.lon],{radius:6,color:color(o),weight:2,fillOpacity:.82}).bindPopup('<b>'+esc(o.name)+'</b><br>'+esc(o.object_type_final||'objekt')).on('click',()=>showDetails(o)).addTo(markerLayer));document.getElementById('marked').textContent=max.length}
function drawResults(){const box=document.getElementById('results');box.innerHTML='';visible.slice(0,80).forEach(o=>{const d=document.createElement('div');d.className='result';d.innerHTML='<small>'+esc(o.object_type_final||o.record_status||'objekt')+'</small><b>'+esc(o.name)+'</b><span class="muted">'+esc([o.nearest_place,o.municipality,o.county].filter(Boolean).join(' · '))+'</span>';d.onclick=()=>{map.setView([o.lat,o.lon],14);showDetails(o)};box.appendChild(d)});if(visible.length>80){const more=document.createElement('p');more.className='muted';more.textContent='Prikazano prvih 80 rezultata. Suzite pretragu za preciznije.';box.appendChild(more)}}
function showDetails(o){document.getElementById('details').innerHTML='<h2>'+esc(o.name)+'</h2><p class="muted">'+esc([o.object_type_final,o.record_status,o.cadastral_number].filter(Boolean).join(' · '))+'</p><div class="kv"><div>Koordinate</div><div>'+fmt(o.lat)+', '+fmt(o.lon)+'</div><div>Dubina</div><div>'+val(o.depth_m,'m')+'</div><div>Duljina</div><div>'+val(o.length_m,'m')+'</div><div>Mjesto</div><div>'+esc([o.nearest_place,o.locality,o.municipality].filter(Boolean).join(' · '))+'</div><div>Pristup</div><div>'+esc(o.access_description||'—')+'</div><div>Opis</div><div>'+esc(o.technical_description||'—')+'</div><div>Napomena</div><div>'+esc(o.note||'—')+'</div></div>'}
function val(v,s){return v==null||v===''?'—':esc(v)+' '+s}
function fmt(n){return Number(n).toFixed(6)}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function setBase(b){if(b==='tk25'){if(!map.hasLayer(tk25))tk25.addTo(map)}else{if(map.hasLayer(tk25))map.removeLayer(tk25);if(!map.hasLayer(osm))osm.addTo(map)}}
function fitAll(){const pts=visible.slice(0,1200).map(o=>[o.lat,o.lon]);if(pts.length)map.fitBounds(pts,{padding:[30,30]})}
function toggleMarkers(){markersVisible=!markersVisible;drawMarkers()}
function exportVisible(){let k='<?xml version="1.0" encoding="UTF-8"?><kml xmlns="http://www.opengis.net/kml/2.2"><Document>';visible.forEach(o=>{k+='<Placemark><name>'+esc(o.name)+'</name><description>'+esc(o.record_status||'')+'</description><Point><coordinates>'+o.lon+','+o.lat+',0</coordinates></Point></Placemark>'});k+='</Document></kml>';const blob=new Blob([k],{type:'application/vnd.google-earth.kml+xml'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='sov-visible-objects.kml';a.click();URL.revokeObjectURL(a.href)}
fetch(DATA_URL).then(r=>r.json()).then(d=>{all=d.filter(o=>Number.isFinite(o.lat)&&Number.isFinite(o.lon));render();fitAll()}).catch(e=>{document.getElementById('results').innerHTML='<p class="muted">Ne mogu učitati JSON bazu. Provjeri da je data/sov-baza.json u repou.</p>'})
</script>
</body></html>
