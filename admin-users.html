<!doctype html><html lang="hr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin approval — SOV Cloud</title><link rel="stylesheet" href="assets/site.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="assets/supabase-config.js"></script><script src="assets/auth.js"></script><style>.admin{max-width:1120px;margin:40px auto;border:1px solid var(--line);border-radius:32px;background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.03));padding:30px}.user{display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center;border:1px solid var(--line);border-radius:20px;padding:16px;margin:12px 0;background:rgba(255,255,255,.035)}.pill{display:inline-flex;border:1px solid var(--line);border-radius:999px;padding:6px 9px;color:var(--muted);font-size:12px;margin-left:8px}.btn{border:1px solid var(--line);border-radius:999px;padding:10px 12px;background:rgba(255,255,255,.04);color:white;font-weight:900;cursor:pointer}.btn.ok{background:var(--accent);color:#101400;border:0}.btn.bad{color:#ffb1b1}.roleSelect{border:1px solid var(--line);border-radius:999px;background:#071013;color:white;padding:10px 12px;font-weight:800}.actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0}.filter{border:1px solid var(--line);border-radius:999px;padding:10px 13px;background:rgba(255,255,255,.04);color:white;font-weight:900;cursor:pointer}.filter.active{background:var(--accent);color:#101400;border-color:transparent}.muted{color:var(--muted)}@media(max-width:760px){.user{grid-template-columns:1fr}.admin{padding:20px}.actions{justify-content:flex-start}}</style>  <link rel="stylesheet" href="assets/mobile.css">
<link rel="stylesheet" href="assets/sov-inbox.css?v=4.90"></head><body><header class="top wrap"><a class="brand" href="dashboard.html"><div class="mark">SOV</div><div><strong>SOV Cloud</strong><small>Admin</small></div></a><nav class="nav"><a href="dashboard.html">Dashboard</a><a href="admin-notifications.html">Obavijesti</a><a href="role-manager.html" data-role-webmaster>Role manager</a><a href="login.html" data-logout>Odjava</a></nav></header><main class="wrap admin"><div class="eyebrow">Admin</div><h1>Odobravanje korisnika</h1><p class="lead">Admin može odobravati nove račune, dodjeljivati operativne role i slati obavijesti. Webmaster rola je rezervirana za Darka i tech/superadmin pristup.</p><div class="toolbar"><button class="filter active" data-filter="all">Svi</button><button class="filter" data-filter="pending">Čekaju</button><button class="filter" data-filter="approved">Odobreni</button><button class="filter" data-filter="rejected">Odbijeni</button></div><div id="users"><p class="muted">Učitavam korisnike...</p></div></main><script>
let currentFilter='all';
document.querySelectorAll('[data-filter]').forEach(b=>b.onclick=()=>{document.querySelectorAll('[data-filter]').forEach(x=>x.classList.remove('active'));b.classList.add('active');currentFilter=b.dataset.filter;render();});
function esc(s){return String(s||'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
async function render(){
  await SOVAuth.ready();
  const box=document.getElementById('users');
  const users=await SOVAuth.loadUsers();
  const shown=currentFilter==='all'?users:users.filter(u=>u.status===currentFilter);
  box.innerHTML='';
  if(!shown.length){box.innerHTML='<p class="muted">Nema korisnika u ovom filteru.</p>';return;}
  const current = await SOVAuth.currentUser();
  const canWebmaster = !!(current && current.role === 'webmaster');
  shown.forEach(u=>{
    const d=document.createElement('div');d.className='user';
    const webmasterOption = canWebmaster ? '<option value="webmaster">Webmaster</option>' : '';
    d.innerHTML='<div><b>'+esc(u.full_name||u.email)+'</b><span class="pill">'+SOVAuth.statusText(u.status)+'</span><span class="pill">'+SOVAuth.roleText(u.role)+'</span><p class="muted">'+esc(u.email)+(u.note?'<br>'+esc(u.note):'')+'</p></div><div class="actions"><select class="roleSelect" data-role="'+esc(u.id)+'"><option value="user">Član</option><option value="editor">Urednik</option><option value="oruzar">Oružar</option><option value="arhivar">Arhivar</option><option value="admin">Admin</option>'+webmasterOption+'</select><button class="btn ok" data-approve="'+esc(u.id)+'">Odobri</button><button class="btn bad" data-reject="'+esc(u.id)+'">Odbij</button></div>';
    box.appendChild(d);
    d.querySelector('[data-role]').value=u.role||'user';
  });
  document.querySelectorAll('[data-approve]').forEach(b=>b.onclick=async()=>{await SOVAuth.approve(b.dataset.approve);render()});
  document.querySelectorAll('[data-reject]').forEach(b=>b.onclick=async()=>{await SOVAuth.reject(b.dataset.reject);render()});
  document.querySelectorAll('[data-role]').forEach(s=>s.onchange=async()=>{await SOVAuth.setRole(s.dataset.role,s.value);render()});
  SOVAuth.renderUserBadge();
}
render();
</script></body></html>
