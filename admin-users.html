<!doctype html><html lang="hr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin approval — SOV Cloud</title><link rel="stylesheet" href="assets/site.css"><script src="assets/auth.js"></script><style>.admin{max-width:1040px;margin:40px auto;border:1px solid var(--line);border-radius:32px;background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.03));padding:30px}.user{display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center;border:1px solid var(--line);border-radius:20px;padding:16px;margin:12px 0;background:rgba(255,255,255,.035)}.pill{display:inline-flex;border:1px solid var(--line);border-radius:999px;padding:6px 9px;color:var(--muted);font-size:12px;margin-left:8px}.btn{border:1px solid var(--line);border-radius:999px;padding:10px 12px;background:rgba(255,255,255,.04);color:white;font-weight:900;cursor:pointer}.btn.ok{background:var(--accent);color:#101400;border:0}.btn.bad{color:#ffb1b1}@media(max-width:700px){.user{grid-template-columns:1fr}.admin{padding:20px}}</style></head><body><script>SOVAuth.requireAdmin()</script><header class="top wrap"><a class="brand" href="dashboard.html"><div class="mark">SOV</div><div><strong>SOV Cloud</strong><small>Admin</small></div></a><nav class="nav"><a href="dashboard.html">Dashboard</a><a href="login.html" data-logout>Odjava</a></nav></header><main class="wrap admin"><div class="eyebrow">Admin</div><h1>Odobravanje korisnika</h1><p class="lead">Registracije su lokalno spremljene u browseru dok ne spojimo pravi backend. Flow i UI su spremni.</p><div id="users"></div></main><script>function render(){const box=document.getElementById('users');const users=SOVAuth.loadUsers();box.innerHTML='';users.forEach(u=>{const d=document.createElement('div');d.className='user';d.innerHTML='<div><b>'+u.name+'</b><span class="pill">'+u.status+'</span><span class="pill">'+u.role+'</span><p class="muted">'+u.email+(u.note?'<br>'+u.note:'')+'</p></div><div><button class="btn ok" data-approve="'+u.email+'">Odobri</button> <button class="btn bad" data-reject="'+u.email+'">Odbij</button></div>';box.appendChild(d)});document.querySelectorAll('[data-approve]').forEach(b=>b.onclick=()=>{SOVAuth.approve(b.dataset.approve);render()});document.querySelectorAll('[data-reject]').forEach(b=>b.onclick=()=>{SOVAuth.reject(b.dataset.reject);render()});SOVAuth.renderUserBadge()}render()</script></body></html>
