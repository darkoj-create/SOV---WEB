  function kind(title){const t=String(title||'').toLowerCase();
    if(t.includes('osobna'))return 'speleo';
    if(t.includes('alpin'))return 'alpinist';
    if(t.includes('užad')||t.includes('uzet')||t.includes('uže')||t.includes('uze'))return 'rope';
    if(t.includes('postavlj')||t.includes('spit')||t.includes('sidri'))return 'anchor';
    if(t.includes('crtan')||t.includes('mjeren'))return 'drawing';
    if(t.includes('bušil')||t.includes('busil')||t.includes('bater')||t.includes('punjač')||t.includes('punjac'))return 'drill';

    if(t.includes('ronil'))return 'diving';
    if(t.includes('medicin'))return 'med';
    if(t.includes('čisto')||t.includes('cisto'))return 'clean';
    if(t.includes('kamp')||t.includes('ekspedic')||t.includes('logor'))return 'tent';

    if(t.includes('alat'))return 'wrench';
    if(t.includes('odje')||t.includes('obu'))return 'boot';

      card.dataset.iconKind=k;

  }
  const obs=new MutationObserver(()=>enhance());
  document.addEventListener('DOMContentLoaded',()=>{enhance(); obs.observe(document.body,{childList:true,subtree:true}); setTimeout(enhance,300); setTimeout(enhance,1000); setTimeout(enhance,2500);});
