<!doctype html><html lang="hr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin — SOV</title><link rel="stylesheet" href="assets/site.css"></head><body><header class="nav wrap"><a class="brand" href="index.html"><div class="brand-mark">SOV</div><div><strong>Speleološki odsjek Velebit</strong><small>Zagreb</small></div></a><nav class="nav-links"><a href="vijesti.html">Vijesti</a><a href="o-drustvu.html">O društvu</a><a href="povijest.html">Povijest</a><a href="velebitaski-duh.html">Velebitaški duh</a><a href="speleoskola.html">Speleoškola</a><a class="pill" href="login.html">Prijava</a></nav></header><main class="wrap"><section class="page-hero"><div class="eyebrow">Admin</div><h1>Odobravanje pristupa.</h1><p class="lead">Lokalni demo auth dok ne spojimo pravi backend.</p></section><article class="article"><div id="list" class="admin-list"></div></article></main><script src="assets/auth.js"></script><script>let me=SOVAuth.require(); if(me.role!=='admin') location.href='dashboard.html'; function draw(){list.innerHTML='';SOVAuth.list().forEach(u=>{let d=document.createElement('div');d.className='admin-user';d.innerHTML='<div><b>'+u.name+'</b><br><span class="muted">'+u.email+' · '+u.status+'</span></div><div>'+(u.status==='pending'?'<button class="btn primary" onclick="SOVAuth.approve(\''+u.email+'\');draw()">Odobri</button>':'')+' <button class="btn" onclick="SOVAuth.reject(\''+u.email+'\');draw()">Obriši</button></div>';list.appendChild(d)})}draw()</script><footer class="footer"><div class="wrap">Speleološki odsjek Velebit · javni portal i članska zona · build v1.3</div></footer></body></html>
